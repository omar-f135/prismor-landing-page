<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Outer triangle -->
  <polygon points="50,6 97,90 3,90" fill="none" stroke="#1a3580" stroke-width="7" stroke-linejoin="round"/>
  <!-- Inner 3D face (left) -->
  <polygon points="50,6 50,52 3,90" fill="#2d5be3" opacity="0.85"/>
  <!-- Inner 3D face (right) -->
  <polygon points="50,6 97,90 50,52" fill="#1a3580" opacity="0.9"/>
  <!-- Bottom bar -->
  <line x1="3" y1="90" x2="97" y2="90" stroke="#1a3580" stroke-width="7" stroke-linecap="round"/>
  <!-- Center ridge line -->
  <line x1="50" y1="6" x2="50" y2="90" stroke="#4a7af5" stroke-width="2.5" opacity="0.7"/>
</svg>
